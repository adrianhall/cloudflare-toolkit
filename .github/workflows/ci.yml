name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel in-progress runs for the same ref so superseded PR pushes don't waste
# runner minutes. On main, each push gets its own run (cancel-in-progress: false).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24 # pin to engines floor (node >= 24); ships npm 11
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check (types, lint, format)
        run: npm run check

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test with coverage
        run: npm run test:coverage

  ci-pass:
    runs-on: ubuntu-latest
    needs: [check, test]
    if: always()
    steps:
      - name: Fail if any dependency job failed or was cancelled
        run: exit 1
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
